services:
  postgres:
    image: postgres:17-alpine
    container_name: kanban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban_dev_password
      POSTGRES_DB: kanban
    # 5432/5433/5437 are taken by other projects on this machine.
    ports:
      - "5434:5432"
    volumes:
      - kanban_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object store for attachments (021). One small container; the
  # app talks the S3 protocol to it via @aws-sdk/client-s3, so pointing at real
  # S3 / R2 / Supabase Storage in prod is only a change of env, no code. The app
  # ensures its bucket exists on first use, so no init container is needed.
  minio:
    image: minio/minio
    container_name: kanban-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_dev_password
    # 9000 is the S3 API, 9001 the web console. The app reaches the API by
    # service name (minio:9000); the host ports are for the console and for
    # host-side tooling/tests.
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - kanban_minio:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply the better-auth schema + our SQL migrations, then exit.
  # Split out of the app's boot so (a) the slim runner image needs none of the
  # dev-time migration tooling, and (b) scaling app to >1 replica cannot race
  # the same migrations. Built from `builder` (full deps + source). Both steps
  # are idempotent, so re-running on every `up` is safe.
  migrate:
    build:
      context: .
      target: builder
    container_name: kanban-migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: postgres://kanban:kanban_dev_password@postgres:5432/kanban
    command: sh -c "npm run db:auth && node scripts/migrate.mjs"
    restart: "no"

  app:
    build:
      context: .
      target: runner
    container_name: kanban-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      # Do not serve until migrations have applied and exited 0.
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    # Secrets (BETTER_AUTH_SECRET, GITHUB_*, ANTHROPIC_API_KEY) come from the same
    # .env.local the dev server reads. Optional, so the stack still comes up on a
    # machine that has none — the affected features simply stay off.
    env_file:
      - path: .env.local
        required: false
    environment:
      # Overrides .env.local's value (which points at the host port 5434): inside
      # the compose network the app reaches Postgres by service name on 5432.
      # `environment` wins over `env_file`, so this is the one that takes effect.
      DATABASE_URL: postgres://kanban:kanban_dev_password@postgres:5432/kanban
      # Where the app is served and what better-auth signs callbacks against.
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      # Attachments storage (021). Inside the compose network the app reaches
      # MinIO by service name; these override any .env.local values (which point
      # at the host port 9000 for local `npm run dev`). Path-style is required —
      # MinIO does not do virtual-host bucket subdomains.
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: attachments
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio_dev_password
    ports:
      - "3000:3000"
    # No curl/wget in the slim image; Node 22 has global fetch. Any response
    # under 500 (incl. the 307 auth redirect) counts as up.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  realtime:
    build:
      context: .
      target: builder
    command: node realtime/server.mjs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: postgres://kanban:kanban_dev_password@postgres:5432/kanban
      REALTIME_PORT: 1234
    ports:
      - "1234:1234"

volumes:
  kanban_pgdata:
  kanban_minio:
