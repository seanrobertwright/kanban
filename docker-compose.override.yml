# Dev override — auto-merged by `docker compose up` on top of docker-compose.yml.
# Swaps the `app` service from the slim prod runner (node server.js) to a
# bind-mounted live-reload dev server.
#
# Next's own docs (node_modules/next/dist/docs/.../local-development.md) warn
# that Docker dev on Windows/Mac makes HMR slow (seconds–minutes) because the
# host filesystem crosses into the Linux container. Fast path is still local
# `npm run dev`. Use this only when you need app + Postgres wired together.
#
# Bundler note: forced to --webpack. Turbopack (Next 16 default) has no polling
# knob, and a Windows-host bind mount drops the inotify events its watcher needs
# -> no reload. Webpack honors WATCHPACK_POLLING, so it reloads reliably.
#
# Migrations are NOT here — the base file's one-shot `migrate` service still runs
# and `app` still waits on it (service_completed_successfully).
services:
  app:
    # Build the full stage (deps + source + next dev), not the slim runner.
    build:
      target: builder
    command: sh -c "npx next dev --webpack -H 0.0.0.0"
    volumes:
      # Host source live into the container.
      - .:/app
      # Anonymous volumes SHADOW the bind mount for these two: keep the image's
      # Linux-built node_modules (never the host's) and the container's own
      # build cache, instead of the host copies clobbering them.
      - /app/node_modules
      - /app/.next
    environment:
      # Windows bind mount loses fs events -> webpack must poll to see edits.
      WATCHPACK_POLLING: "true"
